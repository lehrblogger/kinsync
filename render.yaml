services:
  - type: web
    name: kinsync
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT
    envVars:
      - key: FS_COOKIES
        sync: false
      - key: CRON_SECRET
        generateValue: true
      - key: GITEA_URL
        sync: false
      - key: GITEA_TOKEN
        sync: false
      - key: GITEA_OWNER
        sync: false
      - key: GITEA_REPO
        sync: false
      - key: GITEA_BRANCH
        value: main

  - type: cron
    name: kinsync-cron
    runtime: python
    schedule: "0 6 * * *"  # daily at 6am UTC
    buildCommand: pip install -r requirements.txt
    startCommand: >
      curl -sf "https://kinsync.onrender.com/run"
        -H "Authorization: Bearer $CRON_SECRET"
    envVars:
      - key: CRON_SECRET
        fromService:
          name: kinsync
          type: web
          envVarKey: CRON_SECRET
